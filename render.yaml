services:
  - type: web
    name: fotocloud
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: fotocloud-db
          property: connectionString
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: TOKEN_ENCRYPTION_KEY
        generateValue: true
      - key: MIDTRANS_SERVER_KEY
        sync: false
      - key: MIDTRANS_CLIENT_KEY
        sync: false
      - key: NEXT_PUBLIC_MIDTRANS_CLIENT_KEY
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false

databases:
  - name: fotocloud-db
    plan: free
    databaseName: fotocloud
    user: fotocloud
